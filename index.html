<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN AUDIO ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .studio { background: var(--panel); border: 2px solid #222; padding: 40px; border-radius: 20px; width: 90%; max-width: 900px; box-shadow: 0 0 100px rgba(0,255,136,0.1); }
        .screen { height: 150px; background: #000; border: 1px solid var(--neon); margin-bottom: 30px; border-radius: 10px; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        .unit { background: #1a1a1a; padding: 20px; border-radius: 12px; border-bottom: 4px solid #000; }
        label { display: block; font-size: 12px; color: var(--neon); margin-bottom: 15px; letter-spacing: 2px; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; height: 10px; }
        button#power-core { background: var(--neon); color: black; border: none; width: 100%; padding: 25px; font-weight: 900; font-size: 24px; border-radius: 12px; cursor: pointer; margin-top: 30px; transition: 0.2s; text-transform: uppercase; }
        button#power-core:active { transform: scale(0.98); filter: brightness(1.2); }
        select { background: #222; color: var(--neon); border: 1px solid var(--neon); width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="studio">
        <div class="screen"><canvas id="oscilloscope"></canvas></div>

        <div class="controls">
            <div class="unit">
                <label>GENERE / MATEMATICA</label>
                <select id="mode">
                    <option value="techno">INDUSTRIAL TECHNO</option>
                    <option value="epic">SYMPHONIC DRAMA</option>
                </select>
            </div>
            <div class="unit">
                <label>POTENZA BASSI (SUB)</label>
                <input type="range" id="sub" min="-40" max="5" value="-5">
            </div>
            <div class="unit">
                <label>RESONANCE FILTER</label>
                <input type="range" id="filter" min="100" max="12000" value="4000">
            </div>
            <div class="unit">
                <label>TEMPO (BPM)</label>
                <input type="range" id="bpm" min="110" max="170" value="130">
            </div>
        </div>

        <button id="power-core">IGNITE ENGINE</button>
    </div>

    <script>
        // ENGINE CORE
        const limiter = new Tone.Limiter(-1).toDestination();
        const compressor = new Tone.Compressor(-15, 4).connect(limiter);
        const filter = new Tone.Filter(4000, "lowpass").connect(compressor);
        const reverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).connect(filter);
        const analyser = new Tone.Analyser("waveform", 512).connect(filter);

        const kick = new Tone.MembraneSynth({ 
            envelope: { sustain: 0, attack: 0.001 }, 
            octaves: 10 
        }).connect(filter);
        
        const lead = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sawtooth" },
            envelope: { attack: 0.05, release: 2 }
        }).connect(reverb);

        const scales = {
            techno: ["G1", "G2", "Bb1", "C2"],
            epic: ["G2", "D3", "Eb3", "F3", "G3", "Bb3", "D4"]
        };

        let step = 0;
        const mainLoop = new Tone.Loop(time => {
            const mode = document.getElementById('mode').value;
            const currentScale = scales[mode];

            // KICK DRUM (Matematica a 4/4)
            if (step % 4 === 0) {
                kick.triggerAttackRelease("G1", "8n", time);
            }

            // MELODIC GENERATOR
            if (Math.random() > 0.4) {
                const note = currentScale[Math.floor(Math.random() * currentScale.length)];
                lead.triggerAttackRelease(note, "4n", time, 0.4);
            }
            step = (step + 1) % 16;
        }, "16n");

        // VISUALIZER
        const canvas = document.getElementById("oscilloscope");
        const ctx = canvas.getContext("2d");
        function draw() {
            requestAnimationFrame(draw);
            const data = analyser.getValue();
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = "#00ff88";
            ctx.lineWidth = 3;
            for(let i=0; i<data.length; i++){
                const x = (i/data.length) * canvas.width;
                const y = (data[i]+1) * (canvas.height/2);
                i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke();
        }
        draw();

        // CONTROLS
        document.getElementById('power-core').onclick = async () => {
            await Tone.start();
            if (Tone.Transport.state !== 'started') {
                Tone.Transport.start();
                mainLoop.start();
                document.getElementById('power-core').innerText = "SHUTDOWN";
                document.getElementById('power-core').style.background = "#ff0044";
            } else {
                Tone.Transport.stop();
                mainLoop.stop();
                document.getElementById('power-core').innerText = "IGNITE ENGINE";
                document.getElementById('power-core').style.background = "#00ff88";
            }
        };

        document.getElementById('filter').oninput = (e) => filter.frequency.value = e.target.value;
        document.getElementById('bpm').oninput = (e) => Tone.Transport.bpm.value = e.target.value;
        document.getElementById('sub').oninput = (e) => kick.volume.value = e.target.value;
    </script>
</body>
</html>
