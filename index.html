<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CHAOS ENGINE v666 - EXTREME AUDIO ARCHITECT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --danger: #ff003c; --void: #000000; --acid: #ccff00; --electric: #00e5ff; }
        body { background: var(--void); color: white; font-family: 'IBM Plex Mono', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Interfaccia Brutalista */
        .mainframe { width: 95%; max-width: 1200px; padding: 40px; border: 2px solid #1a1a1a; margin-top: 20px; background: linear-gradient(145deg, #0a0a0a, #111); position: relative; }
        .glitch-title { font-size: 3rem; font-weight: 900; color: var(--acid); text-transform: uppercase; margin: 0; letter-spacing: -5px; }
        
        /* Visualizer X-Y Mode */
        .vector-scope { height: 300px; background: #000; border: 1px solid #222; margin: 20px 0; position: relative; box-shadow: inset 0 0 50px var(--acid); }
        canvas { width: 100%; height: 100%; filter: blur(0.5px) contrast(1.2); }

        /* Rack Modulare */
        .rack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .module { background: #000; border: 1px solid #333; padding: 20px; position: relative; overflow: hidden; }
        .module::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--electric); }
        .module.red::before { background: var(--danger); }
        
        .knob-label { font-size: 10px; color: #555; display: flex; justify-content: space-between; margin-bottom: 8px; }
        input[type=range] { width: 100%; appearance: none; background: #222; height: 2px; outline: none; margin: 15px 0; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: white; cursor: pointer; border-radius: 0; }

        /* Pulsantiera di Controllo */
        .bridge { margin-top: 40px; display: flex; gap: 20px; align-items: center; background: #000; padding: 20px; border: 1px solid #333; }
        .heavy-btn { background: var(--danger); color: white; border: none; padding: 25px 60px; font-weight: 900; font-size: 1.5rem; cursor: pointer; transition: 0.1s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
        .heavy-btn:active { transform: scale(0.95); filter: brightness(1.5); }
        
        .status-led { width: 12px; height: 12px; border-radius: 50%; background: #300; display: inline-block; }
        .status-led.active { background: var(--acid); box-shadow: 0 0 15px var(--acid); }
    </style>
</head>
<body>

<div class="mainframe">
    <h1 class="glitch-title">CHAOS_ENGINE.exe</h1>
    
    <div class="vector-scope"><canvas id="canvas"></canvas></div>

    <div class="rack-grid">
        <div class="module red">
            <h3 style="color:var(--danger)">01. NEURAL BASS (303 ON STEROIDS)</h3>
            <div class="knob-label">DISTORSIONE ATOMICA <span id="distVal">0.1</span></div>
            <input type="range" id="dist" min="0" max="1" step="0.01" value="0.1">
            <div class="knob-label">RESONANCE PEAK</div>
            <input type="range" id="res" min="0" max="40" value="15">
            <div class="knob-label">FM MODULATION</div>
            <input type="range" id="fm" min="0" max="100" value="0">
        </div>

        <div class="module">
            <h3 style="color:var(--electric)">02. KINETIC DRUMS</h3>
            <div class="knob-label">BIT-CRUSH (LO-FI)</div>
            <input type="range" id="crush" min="1" max="16" value="16">
            <div class="knob-label">PUNCH DEPTH</div>
            <input type="range" id="kickDecay" min="0.05" max="2" step="0.05" value="0.5">
        </div>

        <div class="module">
            <h3 style="color:white">03. VOID VERB</h3>
            <div class="knob-label">DIMENSIONE STANZA</div>
            <input type="range" id="revSize" min="0" max="1" step="0.01" value="0.5">
            <div class="knob-label">GHOST FEEDBACK</div>
            <input type="range" id="delay" min="0" max="0.9" step="0.01" value="0.3">
        </div>

        <div class="module">
            <h3 style="color:var(--acid)">04. ENTROPY MOD</h3>
            <div class="knob-label">AUTO-EVOLUZIONE (AI)</div>
            <input type="range" id="entropy" min="0" max="100" value="0">
            <div class="knob-label">MASTER BPM</div>
            <input type="range" id="bpm" min="40" max="220" value="135">
        </div>
    </div>

    <div class="bridge">
        <button id="ignite" class="heavy-btn">INITIALIZE CORE</button>
        <div>
            <div id="led" class="status-led"></div>
            <span style="font-size: 10px; margin-left: 10px; letter-spacing: 2px;">SYNC STATUS: <span id="syncText">OFFLINE</span></span>
        </div>
    </div>
</div>

<script>
    // --- IL MOTORE DEL CAOS ---
    const distortion = new Tone.Distortion(0.1).toDestination();
    const bitCrusher = new Tone.BitCrusher(16).connect(distortion);
    const reverb = new Tone.Reverb({decay: 5, wet: 0.3}).connect(bitCrusher);
    const delay = new Tone.FeedbackDelay("8n.", 0.3).connect(reverb);
    const masterFilter = new Tone.Filter(2000, "lowpass").connect(delay);
    const analyser = new Tone.Analyser("waveform", 1024).connect(masterFilter);

    // Strumenti Estremi
    const kick = new Tone.MembraneSynth({volume: 5, octaves: 12}).connect(masterFilter);
    const bass = new Tone.MonoSynth({
        oscillator: { type: "sawtooth" },
        envelope: { attack: 0.02, decay: 0.1, sustain: 0.5, release: 1 }
    }).connect(masterFilter);
    const fmSynth = new Tone.FMSynth({volume: -10}).connect(reverb);

    // Algoritmo di Generazione Sequenziale
    let step = 0;
    const notes = ["G1", "G2", "Bb1", "F1", "C2", "Ab1"];
    
    const loop = new Tone.Loop(time => {
        const entropy = document.getElementById('entropy').value / 100;

        // Logica Kick (Techno Aggressiva)
        if (step % 4 === 0 || (entropy > 0.5 && Math.random() > 0.7)) {
            kick.triggerAttackRelease("G1", "8n", time);
        }

        // Logica Bass (Sequenza Generativa)
        if (Math.random() > (0.2 - entropy)) {
            let n = notes[Math.floor(Math.random() * notes.length)];
            bass.triggerAttackRelease(n, "16n", time);
        }

        // FM Glitch (Assurdità)
        if (entropy > 0.3 && Math.random() > 0.8) {
            fmSynth.triggerAttackRelease("C5", "32n", time, Math.random());
        }

        // Auto-Modulazione (L'AI che "muove" i cursori)
        if (entropy > 0.7) {
            masterFilter.frequency.rampTo(Math.random() * 5000 + 100, "16n");
        }

        step = (step + 1) % 16;
    }, "16n");

    // --- INTERAZIONE & CALIBRAZIONE ---
    document.getElementById('ignite').onclick = async () => {
        await Tone.start();
        if (Tone.Transport.state !== 'started') {
            Tone.Transport.start();
            loop.start();
            document.getElementById('ignite').innerText = "TERMINATE CORE";
            document.getElementById('led').classList.add('active');
            document.getElementById('syncText').innerText = "ONLINE / DISTORTING";
        } else {
            Tone.Transport.stop();
            loop.stop();
            document.getElementById('ignite').innerText = "INITIALIZE CORE";
            document.getElementById('led').classList.remove('active');
            document.getElementById('syncText').innerText = "OFFLINE";
        }
    };

    // Mapping Controlli
    document.getElementById('dist').oninput = (e) => distortion.distortion = e.target.value;
    document.getElementById('res').oninput = (e) => bass.filter.Q.value = e.target.value;
    document.getElementById('crush').oninput = (e) => bitCrusher.bits.value = e.target.value;
    document.getElementById('revSize').oninput = (e) => reverb.wet.value = e.target.value;
    document.getElementById('bpm').oninput = (e) => Tone.Transport.bpm.value = e.target.value;
    document.getElementById('fm').oninput = (e) => fmSynth.harmonicity.value = e.target.value;

    // Visualizer Vector (X-Y)
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    function render() {
        requestAnimationFrame(render);
        const data = analyser.getValue();
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#ccff00";
        ctx.lineWidth = 2;
        
        for(let i=0; i<data.length; i+=2) {
            const x = (data[i] + 1) * (canvas.width / 2);
            const y = (data[i+1] + 1) * (canvas.height / 2);
            i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    render();
</script>
</body>
</html>
