<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>PRO-BIT AUDIO WORKSTATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --bg: #0a0a0b; --panel: #16161a; --accent: #00f2ff; --active: #ff0055; --text: #e1e1e6; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .rack { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 1000px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        /* Sequencer Grid */
        .track { display: grid; grid-template-columns: 100px repeat(16, 1fr) 120px; gap: 5px; align-items: center; margin-bottom: 10px; }
        .label { font-size: 0.7rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .step { aspect-ratio: 1; background: #2d2d35; border: none; border-radius: 4px; cursor: pointer; transition: 0.1s; }
        .step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .step.playing { border: 2px solid white; transform: scale(1.1); }
        .step:nth-child(4n+2) { background: #3d3d45; }

        /* Controls */
        .controls-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
        .module { background: #1f1f26; padding: 15px; border-radius: 10px; }
        .module h4 { margin: 0 0 10px 0; font-size: 0.65rem; color: #888; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        
        button#play-btn { background: var(--active); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        canvas { width: 100%; height: 80px; background: #000; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="rack">
    <div class="header">
        <h2 style="margin:0">MASTER STATION <span style="font-weight:100; font-size: 1rem;">v3.0</span></h2>
        <div>
            <span id="bpm-val">128 BPM</span>
            <input type="range" id="bpm" min="60" max="180" value="128" style="width:100px; margin: 0 20px;">
            <button id="play-btn">START ENGINE</button>
        </div>
    </div>

    <canvas id="vizo"></canvas>

    <div id="sequencer"></div>

    <div class="controls-grid">
        <div class="module">
            <h4>KICK MODELLER</h4>
            <label style="font-size: 10px;">DECAY</label>
            <input type="range" id="k-dec" min="0.1" max="1" step="0.1" value="0.5">
            <label style="font-size: 10px;">PITCH</label>
            <input type="range" id="k-pit" min="30" max="80" value="45">
        </div>
        <div class="module">
            <h4>BASS SYNTH (303)</h4>
            <label style="font-size: 10px;">CUTOFF</label>
            <input type="range" id="s-cut" min="100" max="4000" value="1200">
            <label style="font-size: 10px;">RESONANCE</label>
            <input type="range" id="s-res" min="0" max="20" value="5">
        </div>
        <div class="module">
            <h4>FX UNIT</h4>
            <label style="font-size: 10px;">REVERB</label>
            <input type="range" id="m-rev" min="0" max="1" step="0.1" value="0.3">
            <label style="font-size: 10px;">DELAY</label>
            <input type="range" id="m-del" min="0" max="1" step="0.1" value="0.2">
        </div>
        <div class="module">
            <h4>MASTERING</h4>
            <label style="font-size: 10px;">COMPRESSOR</label>
            <input type="range" id="m-comp" min="-40" max="0" value="-20">
        </div>
    </div>
</div>

<script>
    // --- AUDIO ENGINE SETUP ---
    const limiter = new Tone.Limiter(-1).toDestination();
    const compressor = new Tone.Compressor(-20, 4).connect(limiter);
    const reverb = new Tone.Reverb({ decay: 3, wet: 0.3 }).connect(compressor);
    const delay = new Tone.FeedbackDelay("8n", 0.3).connect(compressor);
    const analyser = new Tone.Analyser("waveform", 512).connect(limiter);

    const kick = new Tone.MembraneSynth().connect(compressor);
    const snare = new Tone.NoiseSynth({ volume: -10 }).connect(compressor);
    const hihat = new Tone.MetalSynth({ volume: -15 }).connect(compressor);
    const bassFilter = new Tone.Filter(1200, "lowpass").connect(delay).connect(reverb);
    const bass = new Tone.MonoSynth({ oscillator: { type: "sawtooth" } }).connect(bassFilter);

    const instruments = [
        { name: 'KICK', synth: kick, note: 'G1' },
        { name: 'SNARE', synth: snare, note: '' },
        { name: 'HI-HAT', synth: hihat, note: '' },
        { name: 'BASS', synth: bass, note: 'G2' }
    ];

    const grid = instruments.map(() => Array(16).fill(false));
    const seqContainer = document.getElementById('sequencer');

    // Build UI Grid
    instruments.forEach((inst, i) => {
        const row = document.createElement('div');
        row.className = 'track';
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = inst.name;
        row.appendChild(label);

        for (let s = 0; s < 16; s++) {
            const btn = document.createElement('button');
            btn.className = 'step';
            btn.onclick = () => {
                grid[i][s] = !grid[i][s];
                btn.classList.toggle('active');
            };
            row.appendChild(btn);
        }
        seqContainer.appendChild(row);
    });

    // Loop Logic
    let index = 0;
    Tone.Transport.scheduleRepeat(time => {
        let step = index % 16;
        instruments.forEach((inst, i) => {
            const btns = document.querySelectorAll(`.track:nth-child(${i+1}) .step`);
            btns.forEach(b => b.classList.remove('playing'));
            btns[step].classList.add('playing');

            if (grid[i][step]) {
                if (inst.name === 'SNARE' || inst.name === 'HI-HAT') inst.synth.triggerAttackRelease("16n", time);
                else inst.synth.triggerAttackRelease(inst.note, "16n", time);
            }
        });
        index++;
    }, "16n");

    // Event Listeners
    document.getElementById('play-btn').onclick = async () => {
        await Tone.start();
        if (Tone.Transport.state !== 'started') {
            Tone.Transport.start();
            document.getElementById('play-btn').innerText = "STOP ENGINE";
        } else {
            Tone.Transport.stop();
            document.getElementById('play-btn').innerText = "START ENGINE";
        }
    };

    document.getElementById('bpm').oninput = (e) => {
        Tone.Transport.bpm.value = e.target.value;
        document.getElementById('bpm-val').innerText = e.target.value + " BPM";
    };

    document.getElementById('k-dec').oninput = (e) => kick.envelope.decay = e.target.value;
    document.getElementById('s-cut').oninput = (e) => bassFilter.frequency.value = e.target.value;
    document.getElementById('s-res').oninput = (e) => bassFilter.Q.value = e.target.value;
    document.getElementById('m-rev').oninput = (e) => reverb.wet.value = e.target.value;
    document.getElementById('m-del').oninput = (e) => delay.wet.value = e.target.value;

    // Visualizer
    const canvas = document.getElementById("vizo");
    const ctx = canvas.getContext("2d");
    function draw() {
        requestAnimationFrame(draw);
        const data = analyser.getValue();
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.beginPath(); ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 2;
        for(let i=0; i<data.length; i++) {
            const x = (i/data.length) * canvas.width;
            const y = (data[i]+1) * (canvas.height/2);
            i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    draw();
</script>
</body>
</html>
