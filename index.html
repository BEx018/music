<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TITAN RACK - AUDIO ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #080808; --unit: #151515; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .rack { background: #111; border: 3px solid #333; padding: 30px; border-radius: 10px; width: 95%; max-width: 1000px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .display-master { height: 100px; background: #000; border: 1px solid var(--neon); margin-bottom: 20px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .grid-channels { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .channel { background: var(--unit); padding: 15px; border-radius: 8px; border-left: 4px solid var(--neon); }
        .channel h3 { font-size: 0.7rem; margin: 0 0 15px 0; color: var(--neon); letter-spacing: 2px; }
        label { font-size: 0.6rem; display: block; margin-top: 10px; color: #666; }
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: crosshair; }
        .master-controls { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; display: flex; gap: 20px; align-items: center; }
        button#ignite { background: var(--neon); color: black; border: none; padding: 20px 40px; font-weight: 900; font-size: 1.2rem; cursor: pointer; flex-grow: 1; border-radius: 4px; }
        button#ignite.active { background: #ff0055; color: white; }
    </style>
</head>
<body>

    <div class="rack">
        <div class="display-master"><canvas id="scope"></canvas></div>

        <div class="grid-channels">
            <div class="channel">
                <h3>01. KICK (BASSI)</h3>
                <label>CALIBRATORE VOL</label>
                <input type="range" id="kickVol" min="-40" max="0" value="-5">
                <label>ATTACCO</label>
                <input type="range" id="kickAtk" min="0.01" max="0.2" step="0.01" value="0.01">
            </div>

                <h3>02. SNARE (RULLANTE)</h3>

                <input type="range" id="snareVol" min="-40" max="0" value="-10">
