<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Arcade Synth Engine v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --neon: #39ff14; --cyber: #bc13fe; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .arcade-panel { background: #1a1a1a; border: 4px solid #333; padding: 25px; border-radius: 20px; box-shadow: 0 0 40px rgba(188, 19, 254, 0.2); width: 90%; max-width: 900px; }
        .display { background: #000; border: 2px solid var(--cyber); height: 100px; margin-bottom: 20px; border-radius: 10px; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .grid-ui { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .module { background: #222; padding: 15px; border-radius: 10px; border-bottom: 4px solid #000; }
        label { display: block; font-size: 0.7rem; margin-bottom: 10px; color: var(--neon); text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--cyber); cursor: crosshair; }
        .btn-main { background: var(--cyber); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; font-size: 1.5rem; border-radius: 10px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #7a09a5; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .led.on { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div class="arcade-panel">
        <div class="display">
            <canvas id="osc"></canvas>
        </div>

        <div class="grid-ui">
            <div class="module">
                <label>👾 DISTORSIONE (Bitcrush)</label>
                <input type="range" id="crush" min="1" max="16" value="16">
            </div>
            <div class="module">
                <label>🌀 LFO SPEED (Wobble)</label>
                <input type="range" id="lfo" min="0" max="10" step="0.1" value="2">
            </div>
            <div class="module">
                <label>🎹 ATMOSFERA</label>
                <select id="mood" style="width:100%; background:#333; color:white; border:none; padding:5px;">
                    <option value="dark">DARK TECHNO (Minore)</option>
                    <option value="heroic">SINFONIA (Maggiore)</option>
                    <option value="alien">ALIEN (Diminuita)</option>
                </select>
            </div>
            <div class="module">
                <label>⏱ BPM SPEED</label>
                <input type="range" id="bpm" min="80" max="180" value="128">
            </div>
        </div>

        <button id="power" class="btn-main">INSERT COIN (START)</button>
        <p style="font-size: 0.6rem; text-align: center; margin-top: 10px;">SYSTEM STATUS: <span id="status">OFFLINE</span></p>
    </div>
