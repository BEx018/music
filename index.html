<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TE-ULTRA // MODULAR CONSOLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap');
        :root { --orange: #ff4d00; --blue: #007aff; --dark: #121212; --panel: #efefef; --border: #d1d1d1; }
        
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: #d0d0d0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .console {
            background: var(--panel); width: 1200px; height: 800px; border-radius: 40px;
            padding: 30px; border: 2px solid #bbb; box-shadow: 30px 30px 60px #aaa;
            display: grid; grid-template-columns: 1fr 350px; grid-template-rows: 120px 1fr 120px; gap: 20px;
        }

        /* LCD DISPLAY */
        .lcd { 
            grid-column: 1 / 3; background: #000; border-radius: 20px; padding: 20px;
            border: 5px solid #333; display: flex; justify-content: space-between; align-items: center;
        }
        canvas { width: 600px; height: 60px; }
        .lcd-text { color: var(--orange); font-size: 12px; font-weight: 800; }

        /* SEQUENCER AREA */
        .sequencer { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .track { 
            background: #e5e5e5; padding: 12px; border-radius: 12px; border: 1px solid #ccc;
            display: grid; grid-template-columns: 140px 140px 1fr; gap: 15px; align-items: center;
        }
        .track.selected { border: 2px solid var(--orange); background: #fff; }
        .track-name { font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; padding: 5px; border-radius: 4px; }
        .track-name:hover { background: var(--orange); color: white; }

        /* INSPECTOR PANEL (L'aggiunta Pro) */
        .inspector { 
            background: #fff; border-radius: 20px; border: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: inset 5px 5px 15px #eee;
        }
        .ins-title { font-weight: 800; color: var(--orange); border-bottom: 2px solid var(--orange); padding-bottom: 10px; }
        .param-row { display: flex; flex-direction: column; gap: 5px; }
        .param-label { font-size: 9px; font-weight: 800; color: #888; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; accent-color: var(--orange); cursor: pointer; }

        /* STEP GRID */
        .grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; }
        .s { height: 35px; background: #ccc; border: none; border-radius: 4px; cursor: pointer; }
        .s.on { background: var(--dark); }
        .s.playing { background: var(--orange) !important; transform: scaleY(1.2); }

        /* FOOTER */
        .footer { grid-column: 1 / 3; border-top: 2px solid #ddd; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-pwr { background: var(--dark); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; }
        .btn-pwr.active { background: var(--orange); }

        .macro-btn { font-size: 8px; padding: 4px; border: 1px solid #bbb; border-radius: 3px; cursor: pointer; background: white; }
    </style>
</head>
<body>

<div class="console">
    <div class="lcd">
        <div class="lcd-text">MODE: MULTI-SYNTH PRO<br><span id="bpm-disp">128 BPM</span></div>
        <canvas id="scope"></canvas>
        <div class="lcd-text" style="text-align:right">REC: READY<br><span id="step-disp">POS: 01/16</span></div>
    </div>

    <div class="sequencer" id="track-container"></div>

    <div class="inspector" id="inspector-panel">
        <div class="ins-title">SELECT A TRACK</div>
        <div id="params-content">Seleziona uno strumento a sinistra per modificarne i parametri fisici.</div>
    </div>

    <div class="footer">
        <div style="font-size: 9px; color: #888;">SHORTCUTS: ↑/↓ BPM | SPACE: Play/Stop | C: Clear</div>
        <div style="display:flex; gap: 15px;">
            <button class="btn-pwr" id="btn-rec" style="background:red; display:none;">REC</button>
            <button class="btn-pwr" id="btn-play">INITIALIZE ENGINE</button>
        </div>
    </div>
</div>

<script>
    // --- AUDIO CORE ---
    const limiter = new Tone.Limiter(-1).toDestination();
    const analyser = new Tone.Analyser("waveform", 1024).connect(limiter);

    const instruments = [
        { 
            id: 'KICK', synth: new Tone.MembraneSynth().connect(limiter), note: 'G1', steps: Array(16).fill(false),
            params: { pitchDecay: 0.05, octaves: 10, volume: -6 }
        },
        { 
            id: 'SNARE', synth: new Tone.NoiseSynth({envelope:{decay:0.2}}).connect(limiter), note: '', steps: Array(16).fill(false),
            params: { noiseType: 'white', decay: 0.2, volume: -10 }
        },
        { 
            id: 'ACID', synth: new Tone.MonoSynth({oscillator:{type:'sawtooth'}}).connect(new Tone.Filter(1200, "lowpass").connect(limiter)), note: 'G2', steps: Array(16).fill(false),
            params: { cutoff: 1200, resonance: 5, volume: -12 }
        },
        { 
            id: 'FM-LEAD', synth: new Tone.FMSynth().connect(limiter), note: 'C4', steps: Array(16).fill(false),
            params: { modulationIndex: 10, harmonicity: 2, volume: -15 }
        }
    ];

    let selectedTrack = 0;

    // --- RENDER ENGINE ---
    function render() {
        const container = document.getElementById('track-container');
        container.innerHTML = '';
        instruments.forEach((inst, i) => {
            const track = document.createElement('div');
            track.className = `track ${selectedTrack === i ? 'selected' : ''}`;
            track.innerHTML = `
                <div class="track-name" onclick="selectTrack(${i})">${inst.id}</div>
                <div style="display:flex; gap:3px;">
                    <button class="macro-btn" onclick="fill(${i},4)">1/4</button>
                    <button class="macro-btn" onclick="fill(${i},2)">1/2</button>
                    <button class="macro-btn" onclick="clr(${i})">CLR</button>
                </div>
            `;
            const grid = document.createElement('div');
            grid.className = 'grid';
            inst.steps.forEach((on, s) => {
                const btn = document.createElement('button');
                btn.className = 's' + (on ? ' on' : '');
                btn.onclick = () => { inst.steps[s] = !on; render(); };
                grid.appendChild(btn);
            });
            track.appendChild(grid);
            container.appendChild(track);
        });
        updateInspector();
    }

    function selectTrack(i) { selectedTrack = i; render(); }

    function updateInspector() {
        const panel = document.getElementById('params-content');
        const inst = instruments[selectedTrack];
        document.querySelector('.ins-title').innerText = `EDITING: ${inst.id}`;
        
        let html = '';
        if(inst.id === 'KICK') {
            html += createParam('Octaves', 1, 20, inst.params.octaves, (v) => { inst.synth.octaves = v; inst.params.octaves = v; });
            html += createParam('Pitch Decay', 0.01, 0.5, inst.params.pitchDecay, (v) => { inst.synth.pitchDecay = v; inst.params.pitchDecay = v; });
        } else if(inst.id === 'ACID') {
            html += createParam('Cutoff', 100, 5000, inst.params.cutoff, (v) => { inst.synth.output.frequency.value = v; inst.params.cutoff = v; });
            html += createParam('Resonance', 0, 20, inst.params.resonance, (v) => { inst.synth.output.Q.value = v; inst.params.resonance = v; });
        } else if(inst.id === 'SNARE') {
            html += createParam('Decay', 0.05, 1, inst.params.decay, (v) => { inst.synth.envelope.decay = v; inst.params.decay = v; });
        } else if(inst.id === 'FM-LEAD') {
            html += createParam('Modulation Index', 0, 50, inst.params.modulationIndex, (v) => { inst.synth.modulationIndex.value = v; inst.params.modulationIndex = v; });
        }
        html += createParam('Volume', -40, 0, inst.params.volume, (v) => { inst.synth.volume.value = v; inst.params.volume = v; });
        panel.innerHTML = html;
    }

    function createParam(label, min, max, val, callback) {
        const id = 'p-' + Math.random().toString(36).substr(2, 9);
        setTimeout(() => {
            const el = document.getElementById(id);
            if(el) el.oninput = (e) => { callback(parseFloat(e.target.value)); document.getElementById(id+'-v').innerText = e.target.value; };
        }, 0);
        return `
            <div class="param-row">
                <div class="param-label"><span>${label}</span><span id="${id}-v">${val}</span></div>
                <input type="range" id="${id}" min="${min}" max="${max}" step="${max > 10 ? 1 : 0.01}" value="${val}">
            </div>
        `;
    }

    // --- TRANSPORT & KEYBOARD ---
    let step = 0;
    const loop = new Tone.Loop(time => {
        instruments.forEach(inst => {
            if(inst.steps[step]) {
                if(inst.note) inst.synth.triggerAttackRelease(inst.note, "16n", time);
                else inst.synth.triggerAttackRelease("16n", time);
            }
        });
        Tone.Draw.schedule(() => {
            document.querySelectorAll('.s').forEach(s => s.classList.remove('playing'));
            const rows = document.querySelectorAll('.grid');
            rows.forEach(r => r.children[step].classList.add('playing'));
            document.getElementById('step-disp').innerText = `POS: ${(step+1).toString().padStart(2,'0')}/16`;
        }, time);
        step = (step + 1) % 16;
    }, "16n");

    document.getElementById('btn-play').onclick = async () => {
        await Tone.start();
        if(Tone.Transport.state !== 'started') {
            Tone.Transport.start(); loop.start();
            document.getElementById('btn-play').innerText = "STOP ENGINE";
            document.getElementById('btn-play').classList.add('active');
        } else {
            Tone.Transport.stop(); loop.stop();
            document.getElementById('btn-play').innerText = "INITIALIZE ENGINE";
            document.getElementById('btn-play').classList.remove('active');
        }
    };

    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp') Tone.Transport.bpm.value += 2;
        if(e.key === 'ArrowDown') Tone.Transport.bpm.value -= 2;
        document.getElementById('bpm-disp').innerText = Math.round(Tone.Transport.bpm.value) + " BPM";
        if(e.key === 'c') { instruments.forEach(i => i.steps.fill(false)); render(); }
    });

    // --- MACROS ---
    window.fill = (i, g) => { instruments[i].steps = instruments[i].steps.map((_, idx) => idx % g === 0); render(); };
    window.clr = (i) => { instruments[i].steps.fill(false); render(); };

    // --- VISUALIZER ---
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    function draw() {
        requestAnimationFrame(draw);
        const data = analyser.getValue();
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#ff4d00'; ctx.lineWidth = 3; ctx.beginPath();
        for(let i=0; i<data.length; i++) {
            const x = (i/data.length) * canvas.width;
            const y = (data[i]+1) * (canvas.height/2);
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    draw(); render();
</script>
</body>
</html>
</body>
</html>
