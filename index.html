<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TE-PRO // MODULAR WORKSTATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap');

        :root {
            --te-bg: #d8d8d8;
            --te-panel: #eeeeee;
            --te-orange: #ff4d00;
            --te-blue: #007aff;
            --te-yellow: #ffcc00;
            --te-dark: #1a1a1a;
            --te-gray: #a0a0a0;
        }

        body {
            background-color: var(--te-bg);
            color: var(--te-dark);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .device {
            background: var(--te-panel);
            width: 1050px;
            height: 650px;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 30px 30px 60px #bebebe, -20px -20px 60px #ffffff;
            display: grid;
            grid-template-rows: 100px 1fr 140px;
            gap: 15px;
            border: 1px solid #ccc;
            position: relative;
        }

        /* DISPLAY LCD */
        .display {
            background: #000;
            border-radius: 15px;
            padding: 15px;
            border: 4px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .display-meta {
            display: flex;
            justify-content: space-between;
            color: var(--te-orange);
            font-size: 10px;
            font-weight: 800;
        }
        canvas { width: 100%; height: 45px; opacity: 0.9; }

        /* TRACKS & ROUTING */
        .workspace {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .track-card {
            background: #e5e5e5;
            padding: 12px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 100px 140px 60px 1fr;
            align-items: center;
            gap: 15px;
            border: 1px solid #d0d0d0;
        }
        .track-label { font-size: 11px; font-weight: 800; color: #444; }

        /* MACRO BUTTONS */
        .macro-btns { display: flex; gap: 4px; }
        .m-btn {
            background: #fdfdfd;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 9px;
            padding: 6px;
            cursor: pointer;
            font-weight: 800;
            flex: 1;
        }
        .m-btn:active { background: var(--te-dark); color: white; }

        /* FX ROUTING SWITCH */
        .fx-toggle {
            width: 40px;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .fx-toggle.active { background: var(--te-blue); }
        .fx-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .fx-toggle.active::after { left: 22px; }

        /* SEQUENCER GRID */
        .grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; }
