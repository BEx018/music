<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TE-GOD-MODE // REBORN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&display=swap');
        :root { --orange: #ff4d00; --bg: #0a0a0a; --panel: #151515; --gray: #333; }
        
        body { 
            background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
        }

        /* Schermo Intero per l'inizializzazione */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }

        .btn-init {
            padding: 40px 80px; font-size: 24px; font-weight: 800;
            background: var(--orange); border: none; border-radius: 100px;
            cursor: pointer; box-shadow: 0 0 50px var(--orange);
            color: black; text-transform: uppercase;
        }

        .container {
            width: 90vw; height: 85vh; background: var(--panel);
            border-radius: 30px; border: 1px solid var(--gray);
            display: grid; grid-template-rows: 150px 1fr 100px; padding: 20px; gap: 10px;
        }

        /* LCD */
        .lcd {
            background: black; border-radius: 20px; border: 4px solid #222;
            display: flex; justify-content: space-between; padding: 20px; align-items: center;
        }
        canvas { width: 60%; height: 80px; background: #000; }
        .stats { color: var(--orange); font-size: 14px; }

        /* GRID */
        .mixer { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .track { 
            background: #1a1a1a; padding: 15px; border-radius: 15px;
            display: grid; grid-template-columns: 150px 1fr; gap: 20px; align-items: center;
        }
        .step-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; }
        .step { 
            height: 50px; background: #333; border-radius: 5px; border: none; cursor: pointer;
        }
        .step.on { background: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .step.playing { border: 2px solid white; transform: scale(1.1); }

        .footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 20px; }
        .msg { color: #666; font-size: 10px; }
    </style>
</head>
<body>

<div id="overlay">
    <button class="btn-init" onclick="startSystem()">ACTIVATE SYSTEM</button>
</div>

<div class="container">
    <div class="lcd">
        <div class="stats">
            BPM: <span id="bpm-val">128</span><br>
            STATUS: <span id="status-val" style="color:lime">READY</span>
        </div>
        <canvas id="scope"></canvas>
        <div class="stats" style="text-align:right">
            TRACKS: 05<br>
            ENGINE: GOD_V4
        </div>
    </div>

    <div class="mixer" id="mixer-ui"></div>

    <div class="footer">
        <div class="msg">SPACE: PLAY/STOP | R: RANDOM | C: CLEAR | ARROW UP/DOWN: BPM</div>
        <button onclick="recorderToggle()" id="rec-btn" style="background:red; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:800; cursor:pointer;">REC</button>
    </div>
</div>

<script>
    let isStarted = false;
    let currentStep = 0;
    
    // --- AUDIO SETUP ---
    const limiter = new Tone.Limiter(-1).toDestination();
    const analyser = new Tone.Analyser("waveform", 1024);
    limiter.connect(analyser);

    const tracks = [
        { name: 'KICK', synth: new Tone.MembraneSynth().connect(limiter), note: 'C1', steps: Array(16).fill(false) },
        { name: 'SNARE', synth: new Tone.NoiseSynth({volume: -10}).connect(limiter), note: null, steps: Array(16).fill(false) },
        { name: 'ACID', synth: new Tone.MonoSynth({oscillator:{type:'sawtooth'}, filter:{Q:10}}).connect(limiter), note: 'C2', steps: Array(16).fill(false) },
        { name: 'LEAD', synth: new Tone.FMSynth({volume:-15}).connect(limiter), note: 'G3', steps: Array(16).fill(false) },
        { name: 'HIHAT', synth: new Tone.MetalSynth({volume:-20}).connect(limiter), note: 'C4', steps: Array(16).fill(false) }
    ];

    // --- UI ENGINE ---
    function initUI() {
        const mixer = document.getElementById('mixer-ui');
        mixer.innerHTML = '';
        tracks.forEach((t, i) => {
            const row = document.createElement('div');
            row.className = 'track';
            row.innerHTML = `<div style="font-weight:800">${t.name}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'step-grid';
            t.steps.forEach((on, sIdx) => {
                const b = document.createElement('button');
                b.className = 'step' + (on ? ' on' : '');
                b.onclick = () => { t.steps[sIdx] = !t.steps[sIdx]; b.classList.toggle('on'); };
                grid.appendChild(b);
            });
            row.appendChild(grid);
            mixer.appendChild(row);
        });
    }

    // --- TRANSPORT ---
    const loop = new Tone.Loop(time => {
        tracks.forEach(t => {
            if(t.steps[currentStep]) {
                if(t.name === 'SNARE' || t.name === 'HIHAT') t.synth.triggerAttackRelease("16n", time);
                else t.synth.triggerAttackRelease(t.note, "16n", time);
            }
        });

        Tone.Draw.schedule(() => {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('playing'));
            const grids = document.querySelectorAll('.step-grid');
            grids.forEach(g => g.children[currentStep].classList.add('playing'));
        }, time);

        currentStep = (currentStep + 1) % 16;
    }, "16n");

    async function startSystem() {
        await Tone.start();
        document.getElementById('overlay').style.display = 'none';
        isStarted = true;
        initUI();
        animate();
    }

    // --- CONTROLS ---
    window.onkeydown = (e) => {
        if(!isStarted) return;
        if(e.code === 'Space') {
            if(Tone.Transport.state === 'started') {
                Tone.Transport.stop(); loop.stop();
            } else {
                Tone.Transport.start(); loop.start();
            }
        }
        if(e.key === 'r') {
            tracks[2].steps = tracks[2].steps.map(() => Math.random() > 0.7);
            initUI();
        }
        if(e.key === 'c') {
            tracks.forEach(t => t.steps.fill(false));
            initUI();
        }
        if(e.key === 'ArrowUp') {
            Tone.Transport.bpm.value += 5;
            document.getElementById('bpm-val').innerText = Math.round(Tone.Transport.bpm.value);
        }
        if(e.key === 'ArrowDown') {
            Tone.Transport.bpm.value -= 5;
            document.getElementById('bpm-val').innerText = Math.round(Tone.Transport.bpm.value);
        }
    };

    // --- VISUALIZER ---
    const ctx = document.getElementById('scope').getContext('2d');
    function animate() {
        requestAnimationFrame(animate);
        const data = analyser.getValue();
        ctx.fillStyle = 'black'; ctx.fillRect(0,0,800,80);
        ctx.strokeStyle = '#ff4d00'; ctx.lineWidth = 2; ctx.beginPath();
        for(let i=0; i<data.length; i++){
            const x = (i/data.length)*800; const y = (data[i]+1)*40;
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }

    initUI();
</script>
</body>
</html>
