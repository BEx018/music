<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ULTRA RACK PRO - AUDIO MODELLER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --neon: #00ffcc; --gold: #ffcc00; --red: #ff3300; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .master-rack { width: 95%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Pannelli Strumenti */
        .panel { background: #1a1a1a; border: 1px solid #333; border-left: 5px solid #444; padding: 20px; border-radius: 5px; display: grid; grid-template-columns: 120px 1fr 1fr 1fr 1fr; gap: 20px; align-items: center; }
        .panel.kick { border-left-color: var(--red); }
        .panel.snare { border-left-color: var(--gold); }
        .panel.hihat { border-left-color: var(--neon); }
        .panel.synth { border-left-color: #bc13fe; }

        .inst-name { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; color: #888; }
        .knob { display: flex; flex-direction: column; gap: 5px; }
        .knob label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        
        .display { background: #000; height: 120px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .master-strip { background: #111; padding: 25px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed #444; }
        button#start-btn { background: var(--neon); color: black; border: none; padding: 20px 60px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        button#start-btn.on { background: var(--red); color: white; box-shadow: 0 0 20px rgba(255,51,0,0.4); }
    </style>
